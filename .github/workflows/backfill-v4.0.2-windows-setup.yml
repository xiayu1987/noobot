name: Backfill v4.0.2 Windows setup

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backfill-v4.0.2-windows-setup.yml"

permissions:
  contents: write

jobs:
  windows-setup:
    name: Build and upload Windows setup for v4.0.2
    runs-on: windows-latest
    steps:
      - name: Checkout v4.0.2
        uses: actions/checkout@v4
        with:
          ref: v4.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows package
        run: npm run build:windows

      - name: Upload Windows setup
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0.2
          fail_on_unmatched_files: true
          files: |
            client/windows/dist/Noobot Setup *.exe
